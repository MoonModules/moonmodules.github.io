site_name: MoonModules
site_url: https://moonmodules.org
site_description: Open source lighting software, hardware and art
repo_url: https://github.com/MoonModules/moonmodules.github.io
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/moonmodules-logo.png
  favicon: assets/moonmodules-logo.png
  palette:
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.action.edit

extra_css:
  - assets/extra.css

extra_javascript:
  - assets/community-feeds.js

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list

nav:
  - Home: index.md
  - About: about.md
  - Products:
    - Overview: products/index.md
    - WLED-MM: products/wled-mm.md
    - MoonLight: products/moonlight.md
    - projectMM: products/projectmm.md
    - FastLED-MM: products/fastled-mm.md
    - Supporting repos: products/supporting.md
    - Acknowledgements: products/acknowledgements.md
  - Support:
    - Overview: support/index.md
    - Buying Guide: support/buying-guide.md
  - Community: community.md
  - Projects:
    - Overview: projects/index.md
    - Art Installations: projects/art.md
    - Concert at a Festival: projects/concert.md
    - Hardware Builds: projects/hardware.md
    - 3D Prints: projects/3d-prints.md
    - Website Redesign: projects/website-redesign.md
    - Site Map: projects/site-map.md
  - Archive: archive/index.md
  - Contributing: contributing.md
