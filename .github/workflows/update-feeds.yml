name: Update feeds

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: python scripts/fetch_youtube.py
      - run: python scripts/fetch_reddit.py

      - name: Commit and push if feeds changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/assets/youtube-feed.json docs/assets/reddit-feed.json
          git diff --cached --quiet || (git commit -m "Update social feeds" && git push)
